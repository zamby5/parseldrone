<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Parsel Drone V8</title>

<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f7fc}
#map{position:absolute;top:0;bottom:0;width:100%}

.panel{
position:absolute;top:10px;left:10px;background:#fff;
padding:12px;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,.12)
}

input{
width:100%;margin:4px 0;padding:6px;border-radius:6px;border:1px solid #ddd
}

button{
padding:8px;margin-top:5px;border:none;border-radius:6px;
background:#1a4fa0;color:#fff;font-weight:bold;width:100%
}

.pin{
width:14px;height:14px;background:red;border-radius:50%;
animation:pulse 1.5s infinite;
}

@keyframes pulse {
0%{box-shadow:0 0 0 0 rgba(255,0,0,0.7);}
70%{box-shadow:0 0 0 20px rgba(255,0,0,0);}
100%{box-shadow:0 0 0 0 rgba(255,0,0,0);}
}

#info{
position:absolute;bottom:10px;left:10px;
background:#fff;padding:12px;border-radius:12px;
font-size:13px;box-shadow:0 5px 20px rgba(0,0,0,.1)
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
<input id="ilce" placeholder="İlçe ID">
<input id="mahalle" placeholder="Mahalle ID">
<input id="ada" placeholder="Ada">
<input id="parsel" placeholder="Parsel">

<button onclick="start()">PARSELİ GETİR</button>
</div>

<div id="info">Hazır</div>

<script>

// ✅ SENİN WORKER
const WORKER = "https://tkgm-proxy.miyicioglu.workers.dev";

let map;
let POI = [];

function init(){
map=new maplibregl.Map({
container:'map',
style:{
version:8,
sources:{
osm:{
type:"raster",
tiles:["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],
tileSize:256
}
},
layers:[{id:"osm",type:"raster",source:"osm"}]
},
center:[30.65,36.87],
zoom:13
});
}

async function start(){

init();

let ilce = document.getElementById("ilce").value;
let mahalle = document.getElementById("mahalle").value;
let ada = document.getElementById("ada").value;
let parsel = document.getElementById("parsel").value;

if(!ilce || !mahalle || !ada || !parsel){
alert("Tüm alanları doldur");
return;
}

let url = `${WORKER}/parsel/${ilce}/${mahalle}/${ada}/${parsel}`;

try{

let r = await fetch(url);
let data = await r.json();

if(!data.geometry){
throw "Veri yok";
}

let coords = data.geometry.coordinates[0];

// 🟦 PARSEL ÇİZ
map.addSource("parcel",{
type:"geojson",
data:{
type:"Feature",
geometry:{type:"Polygon",coordinates:[coords]}
}
});

map.addLayer({
id:"fill",
type:"fill",
source:"parcel",
paint:{'fill-color':'#00aaff','fill-opacity':0.4}
});

map.addLayer({
id:"line",
type:"line",
source:"parcel",
paint:{'line-color':'#0077aa','line-width':2}
});

// 📍 CENTER
let center = [
(data.properties.minLon + data.properties.maxLon)/2,
(data.properties.minLat + data.properties.maxLat)/2
];

// 🔴 ANA PIN
let el=document.createElement("div");
el.className="pin";
new maplibregl.Marker(el).setLngLat(center).addTo(map);

// 🎯 POI (4 nokta)
POI=[
[center[0]+0.0015,center[1]],
[center[0]-0.0015,center[1]],
[center[0],center[1]+0.0015],
[center[0],center[1]-0.0015]
];

// 🚁 DRONE
let i=0;
function fly(){
map.flyTo({
center:POI[i],
zoom:18,
speed:0.4,
curve:1.2
});
i++;
if(i>=POI.length)i=0;
setTimeout(fly,2500);
}
fly();

// 🧠 AI
let area = data.properties.alan || 300;

let score = 0;
if(area>500) score+=4;
else score+=2;
if(area>800) score+=2;

if(score>10) score=10;

let m2 = 1500 + (score*500);
let value = Math.round(area*m2);

let karar="RİSKLİ";
if(score>=7) karar="ALINIR";
else if(score>=5) karar="ORTA";

document.getElementById("info").innerHTML = `
<b>AI SKOR:</b> ${score}/10<br>
<b>Karar:</b> ${karar}<br>
<b>Alan:</b> ${area} m²<br>
<b>m²:</b> ${m2} ₺<br>
<b>Değer:</b> ${value.toLocaleString()} ₺<br><br>
Developed by Murat İyicioğlu
`;

}catch(e){
document.getElementById("info").innerHTML="⚠️ Veri alınamadı";
}

}

</script>

</body>
</html>
