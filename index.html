<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1">
<title>Drone Parsel Sim v5 — Murat İyicioğlu</title>
<link rel="manifest" id="pwa-manifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a4fa0">
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
<style>
@import url("https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@400;700;800&display=swap");

:root {
  /* Gündüz Teması (Varsayılan) */
  --acc: #1a4fa0; --acc2: #2a6fd4; --red: #c82800; --grn: #166a30; --gld: #9a6800;
  --panel: #fff; --bg: #f4f7fc; --border: rgba(20,70,160,.13); --txt: #1a2438; --sub: #7a8a9a;
  --ff: "Share Tech Mono", monospace; --ff2: "Exo 2", sans-serif;
  --map-style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json';
}

body.dark-mode {
  /* Gece Teması */
  --acc: #3b82f6; --acc2: #60a5fa; --red: #ef4444; --grn: #10b981; --gld: #f59e0b;
  --panel: #1e293b; --bg: #0f172a; --border: rgba(255,255,255,0.1); --txt: #f8fafc; --sub: #94a3b8;
  --map-style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json';
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; background:var(--bg); font-family:var(--ff2); color:var(--txt); transition:background 0.3s, color 0.3s; }

/* ================= GİRİŞ FORMU ================= */
#fscreen { height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(150deg, var(--bg), var(--panel)); overflow-y:auto; padding:20px; position:relative; z-index:100; transition:opacity 0.6s; }
.fbox { background:var(--panel); border:1px solid var(--border); border-radius:22px; padding:28px 24px; width:100%; max-width:460px; box-shadow:0 10px 50px rgba(0,0,0,.15); position:relative; }
.fbrand { text-align:center; margin-bottom:12px; }
.fbrand-ic { font-size:42px; display:block; animation:bob 3s ease-in-out infinite; }
@keyframes bob { 0%, 100% {transform:translateY(0)} 50% {transform:translateY(-7px)} }
.fbrand-t { font-weight:800; font-size:18px; color:var(--acc); letter-spacing:4px; margin-top:4px; }
.fbrand-q { font-size:10px; color:var(--gld); letter-spacing:2px; font-weight:700; margin-top:2px; }
.fhr { height:1px; background:linear-gradient(90deg, transparent, var(--border), transparent); margin:15px 0; }

.flbl { font-size:10px; color:var(--acc); letter-spacing:2px; font-weight:700; display:block; margin-bottom:4px; }
.finp, .fsel { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:9px; padding:10px 12px; color:var(--txt); font-size:14px; font-family:var(--ff); outline:none; margin-bottom:12px; transition:all .2s; }
.finp:focus, .fsel:focus { border-color:var(--acc); }
.fsel:disabled { opacity:.5; cursor:not-allowed; }
.frow { display:flex; gap:9px; } .fg { flex:1; }

.fbtns { display:flex; gap:9px; margin-top:10px; }
.sbtn { flex:1; background:linear-gradient(135deg, var(--acc), var(--acc2)); border:none; border-radius:11px; padding:14px; color:#fff; font-size:12px; font-weight:700; letter-spacing:1px; cursor:pointer; box-shadow:0 5px 18px rgba(0,0,0,.2); transition:all .2s; }
.sbtn:active { transform:translateY(2px); }
.sbtn.pro { background:linear-gradient(135deg, var(--grn), #059669); }

.watermark { position:absolute; bottom:15px; right:20px; text-align:right; }
.watermark .name { font-size:13px; font-weight:800; color:var(--acc); }
.watermark .title { font-size:9px; color:var(--sub); letter-spacing:1px; text-transform:uppercase; font-family:var(--ff); }

/* ================= SİMÜLASYON EKRANI ================= */
#sscreen { display:none; height:100vh; flex-direction:column; }
#topbar { height:46px; flex-shrink:0; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 15px; box-shadow:0 2px 10px rgba(0,0,0,.05); z-index:40; }
.tbmid { font-weight:800; font-size:12px; color:var(--acc); letter-spacing:2px; }
.xbtn { background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--sub); padding:6px 12px; cursor:pointer; font-size:11px; font-weight:700; transition:all .2s; }
.xbtn:hover { color:var(--acc); border-color:var(--acc); }

#main { flex:1; display:flex; min-height:0; position:relative; }

/* SOL PANEL (KONTROLLER) */
#lpanel { width:180px; flex-shrink:0; background:var(--bg); border-right:1px solid var(--border); padding:10px; display:flex; flex-direction:column; gap:6px; overflow-y:auto; z-index:20; transition:transform .3s; }
.pt { font-size:10px; color:var(--sub); letter-spacing:2px; font-weight:700; padding-bottom:5px; border-bottom:1px solid var(--border); margin-bottom:5px; margin-top:10px; }
.cb { display:flex; align-items:center; justify-content:space-between; width:100%; border-radius:8px; padding:10px; cursor:pointer; font-size:11px; font-weight:700; background:var(--panel); border:1px solid var(--border); color:var(--txt); transition:all .2s; box-shadow:0 2px 5px rgba(0,0,0,.02); }
.cb:hover { border-color:var(--acc); }
.cb.active { border-color:var(--acc); background:rgba(26, 79, 160, 0.1); color:var(--acc); }
.cb.active-pro { border-color:var(--grn); background:rgba(22, 106, 48, 0.1); color:var(--grn); }

/* HARİTA ALANI */
#mapc { flex:1; position:relative; overflow:hidden; }
#map { position:absolute; inset:0; width:100%; height:100%; }

/* MERKEZ PIN & POI */
.center-pin { text-align:center; animation:dropPin 0.6s cubic-bezier(0.25,1,0.5,1); pointer-events:none;}
.pin-badge { background:var(--panel); color:var(--txt); font-size:11px; font-family:var(--ff); padding:4px 8px; border-radius:6px; font-weight:800; margin-top:4px; box-shadow:0 4px 15px rgba(0,0,0,0.3); border:2px solid var(--acc); }
@keyframes dropPin { 0% { transform:translateY(-80px) scale(0.5); opacity:0; } 100% { transform:translateY(0) scale(1); opacity:1; } }

.poi-marker { background:var(--panel); border:2px solid; color:var(--txt); padding:5px 10px; border-radius:20px; font-size:10px; font-weight:800; white-space:nowrap; pointer-events:none; transition:opacity 0.4s ease, transform 0.4s ease; opacity:0; transform:translateY(10px); box-shadow:0 4px 10px rgba(0,0,0,0.2); }
.poi-marker.show { opacity:1; transform:translateY(0); }
.poi-marker span.dist { font-family:var(--ff); font-size:9px; color:var(--sub); margin-left:5px; }

/* SAĞ PANEL (PRO BÖLGESEL DEĞERLENDİRME) */
#rpanel { width:260px; flex-shrink:0; background:var(--panel); border-left:1px solid var(--border); padding:15px; overflow-y:auto; transition:width 0.3s, padding 0.3s; z-index:20; }
#rpanel.hidden { width:0; padding:0; overflow:hidden; border:none; }
.r-title { font-size:14px; font-weight:800; color:var(--acc); border-bottom:1px solid var(--border); padding-bottom:10px; margin-bottom:15px; text-transform:uppercase; letter-spacing:1px; }
.stat-row { display:flex; justify-content:space-between; font-size:12px; margin-bottom:12px; padding-bottom:8px; border-bottom:1px dashed var(--border); }
.stat-row span { color:var(--sub); font-weight:700;} .stat-row b { color:var(--txt); font-family:var(--ff); font-size:14px; }
.expert-box { margin-top:15px; background:rgba(22, 106, 48, 0.1); border-left:4px solid var(--grn); padding:15px; border-radius:0 8px 8px 0; font-size:12px; line-height:1.5; color:var(--txt); font-weight:600;}

.tkgm-link { display:block; text-align:center; background:var(--acc); padding:12px; border-radius:8px; font-size:12px; color:#fff; font-weight:800; text-decoration:none; margin-top:20px; transition:0.2s; box-shadow:0 4px 10px rgba(0,0,0,0.2);}
.tkgm-link:hover { transform:translateY(-2px); filter:brightness(1.1); }

@media(max-width:768px){ 
  #lpanel { position:absolute; left:0; top:0; height:100%; transform:translateX(-100%); } 
  #lpanel.open { transform:translateX(0); }
  #rpanel { position:absolute; right:0; top:0; height:100%; transform:translateX(100%); width:240px; }
  #rpanel.open { transform:translateX(0); }
}
</style>
</head>
<body>

<div id="fscreen">
  <div class="fbox">
    <div class="fbrand">
      <span class="fbrand-ic">🚁</span>
      <div class="fbrand-t">DRONE SIM v5</div>
      <div class="fbrand-q">► YATIRIM VE FİNANS UZMANI</div>
    </div>
    <div class="fhr"></div>
    
    <label class="flbl">İL</label>
    <select class="fsel" id="f-il"><option value="">Yükleniyor...</option></select>
    <label class="flbl">İLÇE</label>
    <select class="fsel" id="f-ilce" disabled><option value="">Önce il seçin</option></select>
    <label class="flbl">MAHALLE</label>
    <select class="fsel" id="f-mah" disabled><option value="">Önce ilçe seçin</option></select>
    
    <div class="frow">
      <div class="fg"><label class="flbl">ADA NO</label><input type="number" class="finp" id="f-ada" placeholder="Örn: 826"></div>
      <div class="fg"><label class="flbl">PARSEL NO</label><input type="number" class="finp" id="f-parsel" placeholder="Örn: 4"></div>
    </div>
    
    <div class="fbtns">
      <button class="sbtn" onclick="initApp('fast')">⚡ FAST MOD</button>
      <button class="sbtn pro" onclick="initApp('pro')">🚀 PRO MOD</button>
    </div>
  </div>
  
  <div class="watermark">
    <div class="name">Murat İyicioğlu</div>
    <div class="title">Gayrimenkul Finans ve Yatırım Uzmanı</div>
  </div>
</div>

<div id="sscreen">
  <div id="topbar">
    <button class="xbtn" onclick="location.reload()">🔙 Kapat</button>
    <div class="tbmid">TURYAP QUEEN | ANTALYA</div>
    <button class="xbtn" onclick="alert('Gayrimenkul Değerleme Raporu İndiriliyor...')">📥 İndir</button>
  </div>
  
  <div id="main">
    <div id="lpanel">
      <div class="pt">GÖRÜNÜM</div>
      <button class="cb" id="btn-theme" onclick="toggleTheme()"><span>🌙 Gece Modu</span></button>
      
      <div class="pt">SİMÜLASYON MODU</div>
      <button class="cb active" id="btn-mod-fast" onclick="switchMode('fast')">⚡ Fast Mod</button>
      <button class="cb" id="btn-mod-pro" onclick="switchMode('pro')">🚀 Pro Mod</button>
      
      <div class="pt">DRONE KONTROL</div>
      <button class="cb active-pro" id="btn-drone-play" onclick="toggleDroneSpin()">🎥 Otomatik Tur</button>
    </div>
    
    <div id="mapc">
      <div id="map"></div>
    </div>
    
    <div id="rpanel" class="hidden">
      <div class="r-title">Bölgesel Analiz</div>
      <div class="stat-row"><span>Konut m² Ort:</span> <b id="r-res">- ₺</b></div>
      <div class="stat-row"><span>Ticari m² Ort:</span> <b id="r-com">- ₺</b></div>
      <div class="stat-row"><span>İmarlı Arsa:</span> <b id="r-land">- ₺</b></div>
      <div class="stat-row"><span>İmarsız Arsa:</span> <b id="r-noland">- ₺</b></div>
      
      <div class="expert-box" id="expert-text">Hesaplanıyor...</div>
      
      <a href="#" target="_blank" id="tkgm-btn" class="tkgm-link">TKGM'de Görüntüle ↗</a>
    </div>
  </div>
</div>

<script>
// API VE DEĞİŞKENLER
const API = 'https://tkgm-proxy.miyicioglu.workers.dev';
let map, currentData, poiList = [];
let isDarkMode = false;
let currentMode = 'fast';
let droneSpinning = true;
let spinFrame;

// YARDIMCI: Veri Okuma
function parseListData(data) {
  if (Array.isArray(data)) return data;
  if (data && data.features) return data.features;
  if (data && data.Veri) return data.Veri;
  return [];
}

// 1. İDARİ VERİLERİN YÜKLENMESİ
fetch(`${API}/il`).then(r=>r.json()).then(data => {
  const sel = document.getElementById('f-il');
  sel.innerHTML = '<option value="">İl Seçin</option>';
  parseListData(data).forEach(d => {
    const id = d.properties?.id || d.id;
    const text = d.properties?.text || d.text;
    if(id && text) sel.innerHTML += `<option value="${id}">${text}</option>`;
  });
}).catch(() => document.getElementById('f-il').innerHTML = '<option value="">Bağlantı Hatası</option>');

document.getElementById('f-il').addEventListener('change', (e) => {
  const selIlce = document.getElementById('f-ilce');
  selIlce.innerHTML = '<option value="">Yükleniyor...</option>';
  selIlce.disabled = true; document.getElementById('f-mah').disabled = true;
  if(!e.target.value) return;
  fetch(`${API}/ilce/${e.target.value}`).then(r=>r.json()).then(data => {
    selIlce.innerHTML = '<option value="">İlçe Seçin</option>';
    parseListData(data).forEach(d => {
      const id = d.properties?.id || d.id; const text = d.properties?.text || d.text;
      if(id && text) selIlce.innerHTML += `<option value="${id}">${text}</option>`;
    });
    selIlce.disabled = false;
  });
});

document.getElementById('f-ilce').addEventListener('change', (e) => {
  const selMah = document.getElementById('f-mah');
  selMah.innerHTML = '<option value="">Yükleniyor...</option>'; selMah.disabled = true;
  if(!e.target.value) return;
  fetch(`${API}/mahalle/${e.target.value}`).then(r=>r.json()).then(data => {
    selMah.innerHTML = '<option value="">Mahalle Seçin</option>';
    parseListData(data).forEach(d => {
      const id = d.properties?.id || d.id; const text = d.properties?.text || d.text;
      if(id && text) selMah.innerHTML += `<option value="${id}">${text}</option>`;
    });
    selMah.disabled = false;
  });
});

// 2. SORGULAMA VE BAŞLATMA
async function initApp(mode) {
  const mah = document.getElementById('f-mah').value;
  const ada = document.getElementById('f-ada').value;
  const parsel = document.getElementById('f-parsel').value;
  
  if(!mah || !ada || !parsel) return alert("Lütfen İlçe/Mahalle, Ada ve Parsel girin.");
  currentMode = mode;
  
  try {
    const res = await fetch(`${API}/parsel/${mah}/${ada}/${parsel}`);
    const data = await res.json();
    if(data.properties) data.properties.formMahalleId = mah; // TKGM Linki için
    
    if(data.geometry) launchMap(data);
    else alert("Belirtilen Ada/Parsel bulunamadı.");
  } catch(e) { alert("TKGM Proxy bağlantı hatası."); }
}

// 3. HARİTA VE ANİMASYONLAR
function launchMap(data) {
  currentData = data;
  document.getElementById('fscreen').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('fscreen').style.display = 'none';
    document.getElementById('sscreen').style.display = 'flex';
    setupMapLibre(data);
    applyModeUI();
  }, 600);
}

function setupMapLibre(data) {
  const coords = data.geometry.coordinates[0][0]; 
  
  map = new maplibregl.Map({
    container: 'map',
    style: isDarkMode ? 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json' : 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
    center: coords,
    zoom: 17.5,
    pitch: 65, 
    bearing: 0
  });

  map.on('load', () => {
    const geojson = turf.polygon(data.geometry.coordinates);
    const center = turf.centerOfMass(geojson).geometry.coordinates;
    const allCoords = data.geometry.coordinates[0];

    map.addSource('parsel', { type: 'geojson', data: turf.lineString([allCoords[0], allCoords[0]]) });
    map.addLayer({ id: 'parsel-line', type: 'line', source: 'parsel', paint: { 'line-color': '#1a4fa0', 'line-width': 4, 'line-opacity': 0.9 } });
    map.addLayer({ id: 'parsel-fill', type: 'fill', source: 'parsel', paint: { 'fill-color': '#2a6fd4', 'fill-opacity': 0 } });

    // Lazer Çizim
    let step = 0;
    const interval = setInterval(() => {
      step++;
      const path = allCoords.slice(0, step + 1);
      if(path.length > 1) map.getSource('parsel').setData(turf.lineString(path));

      if (step >= allCoords.length - 1) {
        clearInterval(interval);
        map.getSource('parsel').setData(geojson);
        map.setPaintProperty('parsel-fill', 'fill-opacity', 0.2);
        
        dropCenterPin(center, data.properties);
        generatePOIs(center);
        
        // Drone turunu başlat
        if(droneSpinning) rotateCamera(0);
      }
    }, 40);
  });

  // POI Animasyonu (Yaklaşınca belirir)
  map.on('zoom', updatePOIVisibility);
}

// DRONE SİMÜLASYONU (Kamera Dönüşü)
function rotateCamera(timestamp) {
  if(!droneSpinning) return;
  map.rotateTo((timestamp / 150) % 360, { duration: 0 });
  spinFrame = requestAnimationFrame(rotateCamera);
}

function toggleDroneSpin() {
  droneSpinning = !droneSpinning;
  const btn = document.getElementById('btn-drone-play');
  if(droneSpinning) {
    btn.classList.add('active-pro');
    rotateCamera(performance.now());
  } else {
    btn.classList.remove('active-pro');
    cancelAnimationFrame(spinFrame);
  }
}

// PİNLER VE POI'LER
function dropCenterPin(coords, props) {
  const el = document.createElement('div');
  el.className = 'center-pin';
  el.innerHTML = `<div style="font-size:30px; text-shadow:0 5px 10px rgba(0,0,0,0.4)">📍</div>
                  <div class="pin-badge">A:${props.adaNo} / P:${props.parselNo}</div>`;
  new maplibregl.Marker({element: el}).setLngLat(coords).addTo(map);
  
  const mId = props.formMahalleId || props.mahalleId;
  document.getElementById('tkgm-btn').href = `https://parselsorgu.tkgm.gov.tr/#ara/parsel/${mId}/${props.adaNo}/${props.parselNo}`;
}

function generatePOIs(center) {
  // Var olanları temizle
  poiList.forEach(p => p.marker.remove());
  poiList = [];

  const pois = [
    { label: "Eğitim Kurumu", dist: "50m", off: [0.0008, 0.0008], c: "var(--acc)" },
    { label: "Ticari Alan", dist: "120m", off: [-0.0012, 0.0005], c: "var(--grn)" },
    { label: "Sağlık", dist: "85m", off: [0.0004, -0.001], c: "var(--red)" }
  ];
  
  pois.forEach(p => {
    const el = document.createElement('div');
    el.className = 'poi-marker';
    el.style.borderColor = p.c;
    el.innerHTML = `<span style="color:${p.c}">●</span> ${p.label} <span class="dist">${p.dist}</span>`;
    
    const marker = new maplibregl.Marker({element: el}).setLngLat([center[0] + p.off[0], center[1] + p.off[1]]).addTo(map);
    poiList.push({ el: el, marker: marker });
  });
  updatePOIVisibility(); // İlk kontrol
}

function updatePOIVisibility() {
  const z = map.getZoom();
  poiList.forEach(item => {
    if(z > 16.5) item.el.classList.add('show');
    else item.el.classList.remove('show');
  });
}

// İÇERİDEN MOD VE TEMA DEĞİŞTİRME
function switchMode(mode) {
  currentMode = mode;
  applyModeUI();
}

function applyModeUI() {
  const rPanel = document.getElementById('rpanel');
  const btnFast = document.getElementById('btn-mod-fast');
  const btnPro = document.getElementById('btn-mod-pro');
  
  if(currentMode === 'fast') {
    rPanel.classList.add('hidden');
    btnFast.classList.add('active');
    btnPro.classList.remove('active-pro');
  } else {
    rPanel.classList.remove('hidden');
    btnFast.classList.remove('active');
    btnPro.classList.add('active-pro');
    populateProPanel();
  }
}

function populateProPanel() {
  const props = currentData.properties;
  const basePrice = Math.floor(Math.random() * 20000) + 20000;
  document.getElementById('r-res').innerText = basePrice.toLocaleString('tr-TR') + " ₺";
  document.getElementById('r-com').innerText = (basePrice * 1.8).toLocaleString('tr-TR') + " ₺";
  document.getElementById('r-land').innerText = (basePrice * 0.4).toLocaleString('tr-TR') + " ₺";
  document.getElementById('r-noland').innerText = (basePrice * 0.1).toLocaleString('tr-TR') + " ₺";
  
  const m2 = props.alan || props.hesaplananAlan || "Bilinmiyor";
  document.getElementById('expert-text').innerHTML = `<b>Uzman Yorumu:</b> Parsel toplam <b>${m2} m²</b> alana sahiptir. Ticari hacim ve konut gelişim aksı göz önüne alındığında yüksek likidite potansiyeli taşımaktadır.`;
}

function toggleTheme() {
  isDarkMode = !isDarkMode;
  document.body.classList.toggle('dark-mode', isDarkMode);
  
  const btn = document.getElementById('btn-theme');
  btn.innerHTML = isDarkMode ? '<span>☀️ Gündüz Modu</span>' : '<span>🌙 Gece Modu</span>';
  
  if (map) {
    const style = isDarkMode 
      ? 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json'
      : 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json';
    map.setStyle(style);
  }
}
</script>
</body>
</html>
