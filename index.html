<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drone Parsel Pro v8.0 — Murat İyicioğlu</title>
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url("https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@400;700;800&display=swap");
:root{--acc:#1a4fa0;--red:#c82800;--grn:#166a30;--gld:#9a6800;--ai:#7c3aed;--panel:#fff;--bg:#f4f7fc;--border:rgba(20,70,160,.13);--txt:#1a2438;--sub:#7a8a9a;--ff:"Share Tech Mono",monospace;--ff2:"Exo 2",sans-serif}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--ff)}
#mode-select{position:fixed;inset:0;background:linear-gradient(150deg,#667eea,#764ba2);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.mode-box{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:500px;box-shadow:0 25px 80px rgba(0,0,0,.3);text-align:center}
.mode-title{font-family:var(--ff2);font-size:28px;font-weight:800;color:var(--acc);margin-bottom:8px}
.mode-sub{font-size:12px;color:var(--sub);margin-bottom:30px}
.mode-btns{display:flex;gap:15px;flex-wrap:wrap;justify-content:center}
.mode-btn{flex:1;min-width:140px;padding:20px;border:2px solid var(--border);background:#fff;border-radius:12px;cursor:pointer;transition:all .3s}
.mode-btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.15);border-color:var(--acc)}
.mode-btn.pro{background:linear-gradient(135deg,#f3f0ff,#ede9fe);border-color:var(--ai)}
.mode-icon{font-size:36px;margin-bottom:10px}.mode-name{font-family:var(--ff2);font-size:14px;font-weight:700;color:var(--txt)}
.mode-desc{font-size:10px;color:var(--sub);margin-top:5px}
.creator-foot{margin-top:30px;color:#fff;font-size:11px;opacity:.8}
.creator-foot strong{display:block;font-size:13px;margin-top:5px;font-family:var(--ff2)}

/* LITE MODE */
#lite-mode{display:none;height:100vh;flex-direction:column}
#lite-mode.active{display:flex}
.lite-head{height:50px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 15px}
.lite-title{font-family:var(--ff2);font-size:14px;font-weight:700;color:var(--acc)}
.lite-map{flex:1;position:relative;background:#ddd}
.lite-info{position:absolute;bottom:15px;left:15px;right:15px;background:rgba(255,255,255,.98);border-radius:12px;padding:15px;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.lite-row{display:flex;justify-content:space-between;margin:6px 0;font-size:12px}
.lite-val{font-weight:700;color:var(--txt)}.lite-val.grn{color:var(--grn);font-size:18px;font-family:var(--ff2)}
.lite-btn{width:100%;margin-top:10px;padding:10px;background:var(--acc);color:#fff;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer}

/* PRO MODE */
#pro-mode{display:none;height:100vh;flex-direction:column}
#pro-mode.active{display:flex}
#topbar{height:46px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 12px;box-shadow:0 2px 10px rgba(0,0,0,.07);z-index:50}
.tb-title{font-family:var(--ff2);font-size:11px;font-weight:800;color:var(--acc);letter-spacing:1px}
.tb-actions{display:flex;gap:6px}
.tb-btn{padding:6px 12px;background:#f2f5fb;border:1px solid var(--border);border-radius:6px;font-size:10px;font-weight:700;color:var(--sub);cursor:pointer;transition:all .2s}
.tb-btn:hover{color:var(--acc);border-color:var(--acc)}
.tb-btn.prim{background:var(--acc);color:#fff;border-color:var(--acc)}

#main{flex:1;display:flex;min-height:0;overflow:hidden;position:relative}
#lpanel{width:160px;background:var(--bg);border-right:1px solid var(--border);padding:8px;display:flex;flex-direction:column;gap:4px;overflow-y:auto;z-index:40}
.pt{font-size:8px;color:rgba(20,80,180,.55);letter-spacing:2px;font-weight:700;padding-bottom:3px;border-bottom:1px solid rgba(20,70,160,.08);margin:4px 0;text-transform:uppercase}
.cb{display:block;width:100%;border-radius:7px;padding:6px 8px;cursor:pointer;font-size:10px;font-family:var(--ff);margin-bottom:2px;text-align:left;border:1px solid rgba(20,70,160,.1);background:#fff;color:var(--sub);transition:all .15s}
.cb:hover{border-color:var(--acc);background:#eef4ff;transform:translateX(2px)}
.cb.on{border-color:var(--acc);background:#ddeaff;color:var(--acc);font-weight:700}
.cb.ai-btn{background:#faf5ff;border-color:var(--ai);color:var(--ai)}
.dv{height:1px;background:rgba(20,70,160,.07);margin:3px 0}

#mapc{flex:1;position:relative;min-width:0;overflow:hidden;background:#dde5f0}
#map{position:absolute;inset:0}
#svg-layer{position:absolute;inset:0;pointer-events:none;z-index:20}
.draw-path{fill:none;stroke:var(--red);stroke-width:4;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 8px rgba(200,40,0,.6));stroke-dasharray:3000;stroke-dashoffset:3000;animation:draw 2.5s ease-out forwards}
.draw-fill{fill:rgba(200,40,0,.15);stroke:none;opacity:0;animation:fadeFill .5s ease-out 2s forwards}
@keyframes draw{to{stroke-dashoffset:0}}@keyframes fadeFill{to{opacity:1}}

#pin{position:absolute;transform:translate(-50%,-100%);z-index:30;display:none;animation:pinDrop .8s cubic-bezier(0.175,0.885,0.32,1.275)}
@keyframes pinDrop{0%{transform:translate(-50%,-150%) scale(0);opacity:0}60%{transform:translate(-50%,-100%) scale(1.1);opacity:1}100%{transform:translate(-50%,-100%) scale(1)}}
.pin-head{width:44px;height:44px;background:linear-gradient(135deg,#ff4444,var(--red));border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid #fff;box-shadow:0 4px 15px rgba(200,40,0,.4)}
.pin-head::after{content:'';position:absolute;width:12px;height:12px;background:#fff;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%) rotate(45deg)}
.pin-label{position:absolute;top:-40px;left:50%;transform:translateX(-50%);background:#fff;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:800;font-family:var(--ff2);color:var(--red);border:2px solid var(--red);white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.15)}

.ov{position:absolute;z-index:15;background:rgba(255,255,255,.95);border:1px solid var(--border);border-radius:10px;backdrop-filter:blur(10px);box-shadow:0 4px 15px rgba(0,0,0,.1)}
#hud{top:10px;left:10px;padding:10px 14px;display:flex;gap:16px}
.hudi{text-align:center;min-width:55px}.hudl{font-size:8px;color:var(--sub);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}.hudv{font-size:14px;font-weight:800;color:var(--acc);font-family:var(--ff2)}
#phasind{top:10px;left:50%;transform:translateX(-50%);padding:6px 18px;background:var(--red);color:#fff;font-size:10px;font-weight:800;letter-spacing:2px;border:none;box-shadow:0 4px 15px rgba(200,40,0,.3)}
#compassov{bottom:90px;left:10px;padding:0;background:none;border:none;box-shadow:none;width:70px;height:70px}
#cevreov{bottom:10px;left:10px;right:290px;padding:10px 14px;display:flex;gap:12px;overflow-x:auto;align-items:center}
#finov{bottom:10px;right:10px;width:270px;padding:14px}
.fin-title{font-size:9px;color:var(--sub);letter-spacing:1px;font-weight:700;text-align:center;margin-bottom:8px;text-transform:uppercase}
.fin-deger{font-size:24px;font-weight:800;color:var(--grn);font-family:var(--ff2);text-align:center;margin-bottom:4px}
.fin-detay{font-size:10px;color:var(--sub);text-align:center;line-height:1.5}

#rpanel{width:280px;background:var(--panel);border-left:1px solid var(--border);padding:12px;overflow-y:auto;z-index:40}
.rp-sec{margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.rp-title{font-size:9px;color:var(--acc);letter-spacing:2px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px;text-transform:uppercase}
.rp-row{display:flex;justify-content:space-between;font-size:11px;padding:5px 0;border-bottom:1px dashed rgba(0,0,0,.08)}
.rp-k{color:var(--sub)}.rp-v{color:var(--txt);font-weight:700;max-width:150px;text-align:right}.rp-v.big{font-size:16px;color:var(--grn);font-family:var(--ff2)}
.poi-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:10px;border-bottom:1px solid rgba(0,0,0,.05)}
.poi-ic{width:24px;height:24px;border-radius:50%;background:#f0f4f8;display:flex;align-items:center;justify-content:center;font-size:12px}
.poi-info{flex:1}.poi-name{font-weight:700;color:var(--txt);font-size:11px}.poi-dist{color:var(--sub);font-size:9px}
.ai-box{background:linear-gradient(135deg,#faf5ff,#f3e0ff);border:1.5px solid var(--ai);border-radius:10px;padding:12px;margin-top:10px}
.ai-title{color:var(--ai);font-size:10px;font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.ai-score{background:var(--ai);color:#fff;padding:3px 10px;border-radius:12px;font-size:10px;margin-left:auto;font-family:var(--ff)}
.ai-text{font-size:10px;color:var(--txt);line-height:1.6;margin-bottom:8px}
.ai-tags{display:flex;flex-wrap:wrap;gap:4px}.ai-tag{background:rgba(124,58,237,.1);color:var(--ai);padding:3px 8px;border-radius:6px;font-size:9px;font-weight:600}

/* FORM */
#form-screen{position:fixed;inset:0;background:linear-gradient(150deg,#c8dfff,#edf4fb 50%,#c8e8d0);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.form-box{background:#fff;border-radius:20px;padding:32px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(10,60,160,.15)}
.form-title{font-family:var(--ff2);font-size:22px;font-weight:800;color:var(--acc);text-align:center;margin-bottom:4px}
.form-sub{text-align:center;font-size:10px;color:var(--gld);letter-spacing:2px;font-weight:700;margin-bottom:20px}
.f-row{display:flex;gap:10px;margin:8px 0}
.f-half{flex:1}
.f-lbl{font-size:9px;color:var(--acc);font-weight:700;letter-spacing:1px;margin-bottom:3px;display:block}
.f-inp,.f-sel{width:100%;background:#f2f6fc;border:1px solid rgba(20,90,200,.18);border-radius:9px;padding:10px 12px;font-size:13px;font-family:var(--ff);outline:none}
.f-inp:focus,.f-sel:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(20,100,220,.1);background:#fff}
.f-sel:disabled{opacity:.5;cursor:not-allowed}
.f-btn{width:100%;background:linear-gradient(135deg,#0d3d99,#1e66dd);border:none;border-radius:11px;padding:14px;color:#fff;font-size:12px;font-weight:700;font-family:var(--ff);letter-spacing:2px;cursor:pointer;margin-top:10px;transition:all .2s}
.f-btn:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(10,60,200,.4)}
.f-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.f-btn.sec{background:linear-gradient(135deg,#145522,#229944)}
.f-msg{font-size:10px;color:var(--sub);text-align:center;margin-top:10px;min-height:16px}
.f-msg.err{color:var(--red)}.f-msg.ok{color:var(--grn)}
.creator-btm{text-align:center;margin-top:20px;padding-top:15px;border-top:1px solid var(--border);font-size:10px;color:var(--sub)}
.creator-btm strong{color:var(--acc);font-family:var(--ff2);font-size:12px;letter-spacing:1px}

/* MODALS */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.modal.on{display:flex}
.modal-box{background:#fff;border-radius:16px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 25px 80px rgba(0,0,0,.3)}
.modal-head{padding:20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-family:var(--ff2);font-size:18px;font-weight:700}
.modal-close{width:36px;height:36px;border-radius:8px;border:none;background:#f2f5fb;cursor:pointer;font-size:20px;color:var(--sub)}
.modal-close:hover{background:var(--border)}
.modal-body{padding:20px;line-height:1.6;font-size:13px}
.help-sec{margin-bottom:20px}.help-sec h4{color:var(--acc);font-size:14px;margin-bottom:8px;font-weight:700}
.help-sec p{color:var(--sub);margin-bottom:6px;font-size:12px}
.share-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;padding:20px}
.share-btn{padding:20px;border:2px solid var(--border);border-radius:12px;text-align:center;cursor:pointer;transition:all .2s;background:#fff}
.share-btn:hover{border-color:var(--acc);background:#f8fafc;transform:translateY(-2px)}
.share-ic{font-size:28px;margin-bottom:8px}.share-lbl{font-size:12px;font-weight:600;color:var(--txt)}

@media(max-width:900px){#lpanel{position:absolute;left:0;height:100%;transform:translateX(-100%);transition:transform .3s}#lpanel.open{transform:translateX(0)}#rpanel{position:absolute;right:0;height:100%;width:280px;transform:translateX(100%);transition:transform .3s}#rpanel.open{transform:translateX(0)}#cevreov{right:10px;left:10px}#finov{display:none}}
</style>
</head>
<body>

<!-- MODE SELECT -->
<div id="mode-select">
  <div class="mode-box">
    <div class="mode-title">DRONE PARSEL PRO</div>
    <div class="mode-sub">TKGM Entegre • AI Destekli • Profesyonel Analiz</div>
    <div class="mode-btns">
      <div class="mode-btn" onclick="selectMode('lite')">
        <div class="mode-icon">🚁</div>
        <div class="mode-name">LITE MOD</div>
        <div class="mode-desc">Mobil uyumlu hızlı görüntüleme</div>
      </div>
      <div class="mode-btn pro" onclick="selectMode('pro')">
        <div class="mode-icon">🛸</div>
        <div class="mode-name">PRO MOD</div>
        <div class="mode-desc">360° Drone • AI • Detaylı analiz</div>
      </div>
    </div>
  </div>
  <div class="creator-foot">
    <div>Developed by</div>
    <strong>MURAT IYICIOGLU</strong>
    <div style="margin-top:5px">Turyap Queen Edition v8.0</div>
  </div>
</div>

<!-- FORM SCREEN (Pro için) -->
<div id="form-screen" style="display:none">
  <div class="form-box">
    <div class="form-title">DRONE PARSEL PRO</div>
    <div class="form-sub">TKGM VERI SORGUSU</div>
    
    <div class="f-row">
      <div class="f-half">
        <label class="f-lbl">IL</label>
        <select class="f-sel" id="f-il"><option value="">Yukleniyor...</option></select>
      </div>
      <div class="f-half">
        <label class="f-lbl">ILCE</label>
        <select class="f-sel" id="f-ilce" disabled><option value="">Once il secin</option></select>
      </div>
    </div>
    
    <label class="f-lbl">MAHALLE</label>
    <select class="f-sel" id="f-mah" disabled><option value="">Once ilce secin</option></select>
    
    <div class="f-row">
      <div class="f-half">
        <label class="f-lbl">ADA NO</label>
        <input type="number" class="f-inp" id="f-ada" placeholder="826">
      </div>
      <div class="f-half">
        <label class="f-lbl">PARSEL NO</label>
        <input type="number" class="f-inp" id="f-parsel" placeholder="4">
      </div>
    </div>
    
    <button class="f-btn" id="btn-start" disabled>&#128640; DRONE'U BASLAT</button>
    <button class="f-btn sec" id="btn-demo">&#128752; DEMO MODU</button>
    <div class="f-msg" id="f-msg">TKGM baglantisi kuruluyor...</div>
    
    <div class="creator
