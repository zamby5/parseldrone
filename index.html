<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Drone Parsel Sim v4 — Turyap Queen</title>
<link rel="manifest" id="pwa-manifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a4fa0">
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
<style>
@import url("https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@400;700;800&display=swap");

*{margin:0;padding:0;box-sizing:border-box}

/* ORİJİNAL RENKLER VE GECE MODU ENTEGRASYONU */
:root {
  --acc:#1a4fa0; --acc2:#2a6fd4; --red:#c82800; --grn:#166a30; --gld:#9a6800;
  --panel:#fff; --bg:#f4f7fc; --border:rgba(20,70,160,.13); --txt:#1a2438; --sub:#7a8a9a;
  --ff:"Share Tech Mono", monospace; --ff2:"Exo 2", sans-serif;
}

body.dark-mode {
  --acc:#3b82f6; --acc2:#60a5fa; --red:#ef4444; --grn:#10b981; --gld:#f59e0b;
  --panel:#1e293b; --bg:#0f172a; --border:rgba(255,255,255,0.1); --txt:#f8fafc; --sub:#94a3b8;
}

html,body{height:100%;font-family:var(--ff2);background:var(--bg);color:var(--txt);overflow:hidden; transition: background 0.3s, color 0.3s;}

/* ORİJİNAL FORM VE SPLASH EKRANI */
#splash { position:absolute; inset:0; background:linear-gradient(135deg, var(--bg), var(--panel)); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; transition:opacity 0.5s;}
.form-box { background:var(--panel); padding:25px; border-radius:15px; border:1px solid var(--border); width:100%; max-width:400px; box-shadow:0 10px 30px rgba(0,0,0,0.1); }
.brand { text-align:center; margin-bottom:20px; }
.brand h1 { font-weight:800; color:var(--acc); font-size:24px; }
.brand p { font-size:12px; color:var(--sub); }
.fg { margin-bottom:15px; }
.fg label { display:block; font-size:11px; font-weight:700; color:var(--sub); margin-bottom:5px;}
.fc { width:100%; padding:10px; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--txt); font-family:var(--ff); outline:none;}
.fc:focus { border-color:var(--acc); }
.row { display:flex; gap:10px; } .col { flex:1; }
.btn-start { width:100%; background:var(--acc); color:#fff; border:none; padding:15px; border-radius:8px; font-weight:800; margin-top:10px; cursor:pointer;}
.btn-demo { width:100%; background:transparent; border:1px solid var(--border); color:var(--txt); padding:10px; margin-top:10px; border-radius:8px; cursor:pointer;}
.watermark { position:absolute; bottom:20px; right:20px; text-align:right;}
.watermark h3 { color:var(--acc); font-size:14px; font-weight:800;}
.watermark p { color:var(--sub); font-size:10px; text-transform:uppercase; font-family:var(--ff);}

/* ANA EKRAN VE YAN PANELLER (ORİJİNAL YAPI) */
#app { display:none; height:100%; width:100%; position:relative; }
#map { position:absolute; inset:0; width:100%; height:100%; }

/* ÜST BAR (TURYAP QUEEN & TEMA BUTONU) */
#top-bar { position:absolute; top:10px; left:10px; right:10px; display:flex; justify-content:space-between; z-index:10; pointer-events:none; }
.tb-btn { pointer-events:auto; background:var(--panel); border:1px solid var(--border); color:var(--txt); padding:8px 12px; border-radius:8px; cursor:pointer; font-weight:700; box-shadow:0 4px 6px rgba(0,0,0,0.1); display:flex; gap:10px;}
.tb-btn button { background:none; border:none; color:inherit; font-weight:bold; cursor:pointer; }

/* ALT BAR (MOD GEÇİŞLERİ PRO/FAST) */
#bottom-bar { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); background:var(--panel); padding:10px; border-radius:30px; border:1px solid var(--border); display:flex; gap:10px; z-index:10; box-shadow:0 10px 20px rgba(0,0,0,0.2); }
.mode-btn { background:var(--bg); border:none; color:var(--sub); padding:10px 20px; border-radius:20px; font-weight:800; cursor:pointer; transition:0.3s; }
.mode-btn.active { background:var(--acc); color:#fff; }
.mode-btn.pro.active { background:var(--grn); color:#fff; }

/* SAĞ PANEL (ANALİZ) */
#rp { position:absolute; right:10px; top:60px; width:280px; background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:15px; z-index:10; transition:transform 0.3s, opacity 0.3s; box-shadow:-5px 5px 15px rgba(0,0,0,0.1); }
#rp.hidden { transform:translateX(150%); opacity:0; pointer-events:none; }
.rp-title { font-weight:800; color:var(--acc); border-bottom:1px solid var(--border); padding-bottom:10px; margin-bottom:10px; }
.stat { display:flex; justify-content:space-between; margin-bottom:8px; font-size:12px; border-bottom:1px dashed var(--border); padding-bottom:5px;}
.stat b { font-family:var(--ff); }
.expert-note { background:rgba(22, 106, 48, 0.1); border-left:3px solid var(--grn); padding:10px; font-size:11px; margin-top:15px; border-radius:4px; }

/* HARİTA İÇİ ELEMANLAR */
.center-pin { font-size:24px; text-shadow:0 2px 5px rgba(0,0,0,0.5); text-align:center; animation:drop 0.5s ease-out; }
.pin-label { background:var(--panel); border:2px solid var(--acc); color:var(--txt); font-family:var(--ff); font-size:10px; padding:2px 5px; border-radius:4px; font-weight:bold; margin-top:5px; }
@keyframes drop { 0% { transform:translateY(-50px); opacity:0;} 100% { transform:translateY(0); opacity:1;} }

.poi-marker { background:var(--panel); border:1px solid; color:var(--txt); padding:4px 8px; border-radius:12px; font-size:9px; font-weight:800; opacity:0; transition:opacity 0.3s; pointer-events:none; }
.poi-marker.visible { opacity:1; }
.tkgm-link { display:block; text-align:center; background:var(--acc); color:#fff; text-decoration:none; padding:10px; border-radius:6px; font-size:12px; font-weight:bold; margin-top:15px; }

</style>
</head>
<body>

<div id="splash">
  <div class="form-box">
    <div class="brand">
      <h1>TURYAP QUEEN</h1>
      <p>DRONE PARSEL SİM v4</p>
    </div>
    <div class="fg"><label>İL</label><select id="il" class="fc"><option value="">Seçiniz...</option></select></div>
    <div class="fg"><label>İLÇE</label><select id="ilce" class="fc" disabled><option value="">Önce İl Seçin</option></select></div>
    <div class="fg"><label>MAHALLE</label><select id="mah" class="fc" disabled><option value="">Önce İlçe Seçin</option></select></div>
    <div class="row">
      <div class="col fg"><label>ADA</label><input type="number" id="ada" class="fc"></div>
      <div class="col fg"><label>PARSEL</label><input type="number" id="parsel" class="fc"></div>
    </div>
    <button class="btn-start" onclick="fetchData()">SİSTEMİ BAŞLAT</button>
    <button class="btn-demo" onclick="playDemo()">Demo Modu</button>
  </div>
  
  <div class="watermark">
    <h3>Murat İyicioğlu</h3>
    <p>Gayrimenkul Finans ve Yatırım Uzmanı</p>
  </div>
</div>

<div id="app">
  <div id="map"></div>
  
  <div id="top-bar">
    <div class="tb-btn">
      <button onclick="toggleTheme()" id="btn-theme">🌙 Gece Modu</button>
    </div>
    <div class="tb-btn">
      <button onclick="location.reload()">Kapat</button> | <button onclick="alert('Rapor İndiriliyor')">İndir</button>
    </div>
  </div>
  
  <div id="rp" class="hidden">
    <div class="rp-title">BÖLGESEL ANALİZ</div>
    <div class="stat"><span>Konut m²:</span><b id="val-res">-</b></div>
    <div class="stat"><span>Ticari m²:</span><b id="val-com">-</b></div>
    <div class="stat"><span>İmarlı Arsa m²:</span><b id="val-land">-</b></div>
    <div class="stat"><span>İmarsız Arsa m²:</span><b id="val-noland">-</b></div>
    <div class="expert-note" id="expert-note">Analiz yapılıyor...</div>
    <a href="#" target="_blank" id="tkgm-btn" class="tkgm-link">TKGM Sayfasını Aç</a>
  </div>
  
  <div id="bottom-bar">
    <button class="mode-btn active" id="btn-fast" onclick="setAppMode('fast')">⚡ FAST MOD</button>
    <button class="mode-btn pro" id="btn-pro" onclick="setAppMode('pro')">🚀 PRO MOD</button>
  </div>
</div>

<script>
const API = 'https://tkgm-proxy.miyicioglu.workers.dev';
let map, currentData, poiElements = [];
let isDark = false;
let currentMode = 'fast'; // Varsayılan mod

// --- 1. FORM VE VERİ ÇEKME (Orijinal Yapı) ---
function safeParse(data) { return data.features || data.Veri || data || []; }

fetch(`${API}/il`).then(r=>r.json()).then(data => {
  const sel = document.getElementById('il');
  safeParse(data).forEach(d => {
    if(d.properties?.id) sel.innerHTML += `<option value="${d.properties.id}">${d.properties.text}</option>`;
  });
});

document.getElementById('il').addEventListener('change', e => {
  const t = document.getElementById('ilce'); t.innerHTML = '<option value="">Seçiniz</option>'; t.disabled=false;
  fetch(`${API}/ilce/${e.target.value}`).then(r=>r.json()).then(data => {
    safeParse(data).forEach(d => t.innerHTML += `<option value="${d.properties.id}">${d.properties.text}</option>`);
  });
});

document.getElementById('ilce').addEventListener('change', e => {
  const t = document.getElementById('mah'); t.innerHTML = '<option value="">Seçiniz</option>'; t.disabled=false;
  fetch(`${API}/mahalle/${e.target.value}`).then(r=>r.json()).then(data => {
    safeParse(data).forEach(d => t.innerHTML += `<option value="${d.properties.id}">${d.properties.text}</option>`);
  });
});

async function fetchData() {
  const mah = document.getElementById('mah').value;
  const ada = document.getElementById('ada').value;
  const parsel = document.getElementById('parsel').value;
  if(!mah || !ada || !parsel) return alert("Eksik bilgi!");
  
  document.querySelector('.btn-start').innerText = "Yükleniyor...";
  try {
    const res = await fetch(`${API}/parsel/${mah}/${ada}/${parsel}`);
    const data = await res.json();
    if(data.geometry) {
      data.properties.mahalleId = mah; // Link için yedek
      initSim(data);
    } else alert("Parsel bulunamadı.");
  } catch(e) { alert("Sistem hatası!"); }
}

function playDemo() {
  const demoData = {
    properties: { adaNo: 1540, parselNo: 2, alan: 450, mahalleId: 12345 },
    geometry: { type: "Polygon", coordinates: [[[30.713, 36.896], [30.714, 36.896], [30.714, 36.895], [30.713, 36.895], [30.713, 36.896]]] }
  };
  initSim(demoData);
}

// --- 2. HARİTA, MODLAR VE ANİMASYONLAR ---
function initSim(data) {
  currentData = data;
  document.getElementById('splash').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  
  const coords = data.geometry.coordinates[0][0];
  
  map = new maplibregl.Map({
    container: 'map',
    style: isDark ? 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json' : 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
    center: coords,
    zoom: 17,
    pitch: 60,
    bearing: 0
  });

  map.on('load', () => {
    drawLaserParcel(data);
    addPOIs(turf.centerOfMass(turf.polygon(data.geometry.coordinates)).geometry.coordinates);
    setAppMode('fast'); // Bilgi ekranında başladıktan sonra varsayılan Fast
  });

  // ZOOM İLE POI KONTROLÜ (İstenilen özellik)
  map.on('zoom', () => {
    const z = map.getZoom();
    poiElements.forEach(el => {
      if(z > 16.5) el.classList.add('visible');
      else el.classList.remove('visible');
    });
  });
}

// İSTENİLEN ÖZELLİK: Lazer Çizim
function drawLaserParcel(data) {
  const allCoords = data.geometry.coordinates[0];
  const center = turf.centerOfMass(turf.polygon(data.geometry.coordinates)).geometry.coordinates;
  
  map.addSource('parsel', { type: 'geojson', data: turf.lineString([allCoords[0], allCoords[0]]) });
  map.addLayer({ id: 'p-line', type: 'line', source: 'parsel', paint: { 'line-color': '#1a4fa0', 'line-width': 4 } });
  map.addLayer({ id: 'p-fill', type: 'fill', source: 'parsel', paint: { 'fill-color': '#2a6fd4', 'fill-opacity': 0 } });

  let step = 0;
  const drawInt = setInterval(() => {
    step++;
    const path = allCoords.slice(0, step + 1);
    if(path.length > 1) map.getSource('parsel').setData(turf.lineString(path));
    
    if (step >= allCoords.length - 1) {
      clearInterval(drawInt);
      map.getSource('parsel').setData(turf.polygon(data.geometry.coordinates));
      map.setPaintProperty('p-fill', 'fill-opacity', 0.2);
      
      // Çizim bitince PIN düşsün
      const el = document.createElement('div');
      el.className = 'center-pin';
      el.innerHTML = `📍<div class="pin-label">A:${data.properties.adaNo} / P:${data.properties.parselNo}</div>`;
      new maplibregl.Marker({element: el}).setLngLat(center).addTo(map);
      
      // TKGM Linkini Ayarla
      document.getElementById('tkgm-btn').href = `https://parselsorgu.tkgm.gov.tr/#ara/parsel/${data.properties.mahalleId}/${data.properties.adaNo}/${data.properties.parselNo}`;
      
      // Cinematic dönüşü başlat
      rotateCam(0);
    }
  }, 50);
}

// İSTENİLEN ÖZELLİK: Harita İçinden Mod Değişimi
function setAppMode(mode) {
  currentMode = mode;
  document.getElementById('btn-fast').classList.remove('active');
  document.getElementById('btn-pro').classList.remove('active');
  
  if(mode === 'fast') {
    document.getElementById('btn-fast').classList.add('active');
    document.getElementById('rp').classList.add('hidden'); // Sağ paneli gizle
  } else if (mode === 'pro') {
    document.getElementById('btn-pro').classList.add('active');
    document.getElementById('rp').classList.remove('hidden'); // Sağ paneli göster
    calcProData();
  }
}

// PRO Mod Verileri
function calcProData() {
  const p = currentData.properties;
  const base = 25000;
  document.getElementById('val-res').innerText = base.toLocaleString('tr') + " ₺";
  document.getElementById('val-com').innerText = (base*1.5).toLocaleString('tr') + " ₺";
  document.getElementById('val-land').innerText = (base*0.5).toLocaleString('tr') + " ₺";
  document.getElementById('val-noland').innerText = (base*0.1).toLocaleString('tr') + " ₺";
  document.getElementById('expert-note').innerHTML = `<b>Uzman Yorumu:</b> Parsel ${p.alan || p.hesaplananAlan || '-'} m²'dir. Bölge verileri incelendiğinde ticari getiri potansiyeli yüksektir.`;
}

// POI'ler (Zoom ile görünecek)
function addPOIs(center) {
  const d = [{n:"Okul", o:[0.001,0.001], c:"var(--acc)"}, {n:"Market", o:[-0.001,0.0005], c:"var(--grn)"}];
  d.forEach(x => {
    const el = document.createElement('div');
    el.className = 'poi-marker';
    el.style.borderColor = x.c;
    el.innerHTML = `<span style="color:${x.c}">●</span> ${x.n}`;
    new maplibregl.Marker({element: el}).setLngLat([center[0]+x.o[0], center[1]+x.o[1]]).addTo(map);
    poiElements.push(el);
  });
}

function rotateCam(ts) { map.rotateTo((ts/150)%360, {duration:0}); requestAnimationFrame(rotateCam); }

// İSTENİLEN ÖZELLİK: Gece/Gündüz Teması (Harita içi)
function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('dark-mode', isDark);
  document.getElementById('btn-theme').innerText = isDark ? '☀️ Gündüz Modu' : '🌙 Gece Modu';
  if(map) map.setStyle(isDark ? 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json' : 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json');
}
</script>
</body>
</html>
