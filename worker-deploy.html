<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Worker Deploy</title>
<style>
body{font-family:sans-serif;padding:20px;background:#f5f5f5}
h2{color:#f6821f}
.box{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
button{width:100%;padding:14px;background:#f6821f;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer}
button:disabled{opacity:.5}
#status{margin-top:12px;padding:12px;border-radius:8px;font-size:14px;line-height:1.6;display:none}
.ok{background:#d4edda;color:#155724;display:block!important}
.err{background:#f8d7da;color:#721c24;display:block!important}
.info{background:#d1ecf1;color:#0c5460;display:block!important}
</style>
</head>
<body>
<h2>🛰️ TKGM Worker Deploy</h2>

<div class="box">
  <p style="font-size:13px;color:#666;margin-bottom:12px">Token ve Account ID önceden girildi. Sadece butona bas.</p>
  <button id="btn" onclick="deploy()">🚀 WORKER'I GÜNCELLE</button>
  <div id="status"></div>
</div>

<script>
var ACCOUNT_ID = '405980377b1954f11662998ae37aa50c';
var TOKEN = 'cfut_Wghj2Gcik2yoKFELlFgS637L142XXry8nmffHoNRb88a4d04';
var WORKER_NAME = 'tkgm-proxy';

var WORKER_CODE = `
const TKGM = {
  il      : 'https://parselsorgu.tkgm.gov.tr/app/modules/administrativeQuery/data/ilListe.json',
  ilce    : 'https://cbsapi.tkgm.gov.tr/megsiswebapi.v3.1/api/idariYapi/ilceListe',
  mahalle : 'https://cbsapi.tkgm.gov.tr/megsiswebapi.v3.1/api/idariYapi/mahalleListe',
  parsel  : 'https://cbsapi.tkgm.gov.tr/megsiswebapi.v3.1/api/parsel',
};
const HEADERS_REQ = {
  'Referer'         : 'https://parselsorgu.tkgm.gov.tr/',
  'Origin'          : 'https://parselsorgu.tkgm.gov.tr',
  'User-Agent'      : 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36',
  'Accept'          : 'application/json, */*',
  'Accept-Language' : 'tr-TR,tr;q=0.9',
};
const HEADERS_RES = {
  'Access-Control-Allow-Origin'  : '*',
  'Access-Control-Allow-Methods' : 'GET, OPTIONS',
  'Content-Type'                 : 'application/json;charset=utf-8',
  'Cache-Control'                : 'public, max-age=300',
};
addEventListener('fetch', event => {
  event.respondWith(handleRequest(event.request));
});
async function handleRequest(request) {
  if (request.method === 'OPTIONS') return new Response(null, { status:204, headers:HEADERS_RES });
  const url   = new URL(request.url);
  const path  = url.pathname.replace(/^\\/+/, '');
  const parts = path.split('/');
  let tkgmUrl = null;
  if (parts[0] === 'il') tkgmUrl = TKGM.il;
  else if (parts[0] === 'ilce'    && parts[1]) tkgmUrl = TKGM.ilce    + '/' + parts[1];
  else if (parts[0] === 'mahalle' && parts[1]) tkgmUrl = TKGM.mahalle + '/' + parts[1];
  else if (parts[0] === 'parsel'  && parts[1] && parts[2] && parts[3]) tkgmUrl = TKGM.parsel + '/' + parts[1] + '/' + parts[2] + '/' + parts[3];
  else return new Response(JSON.stringify({error:'Gecersiz endpoint'}), {status:400, headers:HEADERS_RES});
  try {
    const res  = await fetch(tkgmUrl, {method:'GET', headers:HEADERS_REQ});
    const data = await res.text();
    return new Response(data, {status:res.ok?200:res.status, headers:HEADERS_RES});
  } catch(err) {
    return new Response(JSON.stringify({error:err.message}), {status:502, headers:HEADERS_RES});
  }
}
`;

async function deploy() {
  var btn = document.getElementById('btn');
  var st  = document.getElementById('status');
  btn.disabled = true;
  st.className = 'info';
  st.textContent = '⏳ Worker güncelleniyor…';

  try {
    var res = await fetch(
      'https://api.cloudflare.com/client/v4/accounts/' + ACCOUNT_ID + '/workers/scripts/' + WORKER_NAME,
      {
        method: 'PUT',
        headers: {
          'Authorization' : 'Bearer ' + TOKEN,
          'Content-Type'  : 'application/javascript'
        },
        body: WORKER_CODE
      }
    );

    var data = await res.json();

    if (data.success) {
      st.className = 'ok';
      st.innerHTML = '✅ Worker güncellendi!<br><br>'
        + 'Test: <a href="https://tkgm-proxy.miyicioglu.workers.dev/il" target="_blank">workers.dev/il</a><br>'
        + 'İl listesi JSON geliyorsa tamam!';
    } else {
      st.className = 'err';
      st.innerHTML = '❌ Hata:<br>' + JSON.stringify(data.errors);
    }
  } catch(e) {
    st.className = 'err';
    st.textContent = '❌ ' + e.message;
  }
  btn.disabled = false;
}
</script>
</body>
</html>
